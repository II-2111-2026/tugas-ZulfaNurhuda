name: 🎓 Komputasi Probabilitas dan Statistika Autograding Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  evaluate:
    name: 🤖 Evaluate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 🕵️ Detect Active Week
        id: detect-week
        run: python3 tools/detect_week.py

      - name: 🧪 Prepare Test Suites
        run: bash tools/prepare_tests.sh "${{ steps.detect-week.outputs.week }}"

      - name: ⚙️ Execute Autograder (Pytest)
        id: python-test
        uses: classroom-resources/autograding-python-grader@v1
        with:
          timeout: "15"
          max-score: "${{ steps.detect-week.outputs.max_score }}"
          setup-command: |
            python -m pip install -U pip
            pip install -r requirements.txt

      - name: ✨ Refine & Perfect Scores
        id: refine-scores
        if: always()
        env:
          RAW_RESULT: ${{ steps.python-test.outputs.result }}
          MAX_SCORE: ${{ steps.detect-week.outputs.max_score }}
        run: python3 tools/refine_scores.py

      - name: 📤 Report to GitHub Classroom
        if: always()
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          PYTHON-TEST_RESULTS: ${{ steps.refine-scores.outputs.result }}
        with:
          runners: python-test
