name: 🪞 Komputasi Probabilitas dan Statistika Render Quarto & Mirror Docs

on:
  push:
  workflow_dispatch:

jobs:
  publish:
    name: 📄 Render & Publish
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 🕵️ Detect Active Week
        id: detect-week
        run: python3 tools/detect_week.py

      - name: 📦 Install Quarto CLI
        uses: quarto-dev/quarto-actions/setup@v2

      - name: 📄 Render HTML Reports
        run: bash tools/render_quarto.sh
      
      - name: 📎 Upload Reports as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "quarto-${{ steps.detect-week.outputs.week }}"
          if-no-files-found: ignore
          path: docs/

      - name: 🔀 Setup Redirect Rules
        run: |
          echo "/github  https://github.com/ii-2111-2026/tugas-ZulfaNurhuda  302" > docs/_redirects
          echo "✅ File '_redirects' berhasil dibuat!"

      - name: 🚀 Deploy Docs to Mirror Repository
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          repository-name: ZulfaNurhuda/QuartoArtifactPublish-ProbStat
          branch: main
          token: ${{ secrets.MIRROR_REPO_PAT }}
          commit-message: "docs: auto-publish ${{ steps.detect-week.outputs.week }} Quarto Artifact from CI/CD pipeline"
          clean: true 
          workspace: .
